<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام إدارة الطابعات</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: center; }
        th { background-color: #007bff; color: white; }
        .container { max-width: 900px; margin: auto; }
        .form-group { margin-bottom: 15px; background: white; padding: 20px; border-radius: 8px; }
        input, textarea { width: 95%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .btn-delete { background: #dc3545; text-decoration: none; padding: 5px 10px; color: white; border-radius: 3px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>نظام إدارة الطابعات</h2>
        <div class="form-group">
            <form action="/add" method="POST">
                <input type="text" name="name" placeholder="اسم الطابعة" required>
                <input type="text" name="ip" placeholder="IP العنوان" required>
                <input type="text" name="code" placeholder="رمز الطابعة">
                <textarea name="notes" placeholder="ملاحظات إضافية"></textarea>
                <button type="submit">إضافة طابعة</button>
            </form>
        </div>
        <table>
            <thead>
                <tr>
                    <th>الاسم</th>
                    <th>IP العنوان</th>
                    <th>الرمز</th>
                    <th>ملاحظات</th>
                    <th>إجراءات</th>
                </tr>
            </thead>
            <tbody>
                {% for printer in printers %}
                <tr>
                    <td>{{ printer.name }}</td>
                    <td>{{ printer.ip }}</td>
                    <td>{{ printer.code }}</td>
                    <td>{{ printer.notes }}</td>
                    <td><a href="/delete/{{ printer.id }}" class="btn-delete" onclick="return confirm('هل أنت متأكد؟')">حذف</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <br>
        <a href="/logout">تسجيل الخروج</a>
    </div>
</body>
</html>
